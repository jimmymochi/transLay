name: TramsLay Multi-OS Release Build

# 當推送版號標記 (tag) 如 v1.0.0 時，或手動點選觸發時執行
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # =========================================================================
  # 1. Windows 打包編譯工作
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝專案依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行 PyInstaller 打包主程式 Core
        run: |
          pyinstaller --clean build/pyinstaller_onefile.spec

      - name: 執行 PyInstaller 打包啟動器 Launcher
        run: |
          pyinstaller --clean build/pyinstaller_launcher_win.spec

      - name: 重新命名與搬移打包產物
        run: |
          mv build/dist/TramsLay.exe build/dist/TramsLay_Windows_Core.exe
          mv build/dist/TramsLay_Launcher.exe build/dist/TramsLay_Windows_Launcher.exe

      - name: 暫存 Windows 產物
        uses: actions/upload-artifact@v4
        with:
          name: windows-bin
          path: |
            build/dist/TramsLay_Windows_Core.exe
            build/dist/TramsLay_Windows_Launcher.exe

  # =========================================================================
  # 2. macOS 打包編譯工作
  # =========================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝專案依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行 PyInstaller 打包主程式 Core
        run: |
          pyinstaller --clean build/pyinstaller_macos.spec

      - name: 執行 PyInstaller 打包啟動器 Launcher
        run: |
          pyinstaller --clean build/pyinstaller_launcher_mac.spec

      - name: 將 macOS 主程式與啟動器分別打包成標準 .dmg 映像檔
        run: |
          cd build/dist
          hdiutil create -volname "TramsLay_Core" -srcfolder TramsLay.app -ov -format UDZO TramsLay_macOS_Core.dmg
          hdiutil create -volname "TramsLay_Launcher" -srcfolder TramsLay_Launcher.app -ov -format UDZO TramsLay_macOS_Launcher.dmg

      - name: 暫存 macOS 產物
        uses: actions/upload-artifact@v4
        with:
          name: macos-bin
          path: |
            build/dist/TramsLay_macOS_Core.dmg
            build/dist/TramsLay_macOS_Launcher.dmg

  # =========================================================================
  # 3. 建立 GitHub Release 並上傳二進位檔案
  # =========================================================================
  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 下載 Windows 產物
        uses: actions/download-artifact@v4
        with:
          name: windows-bin
          path: release-assets

      - name: 下載 macOS 產物
        uses: actions/download-artifact@v4
        with:
          name: macos-bin
          path: release-assets

      - name: 建立 GitHub Release 並發佈資源
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
